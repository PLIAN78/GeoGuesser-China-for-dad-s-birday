    }

      flex-direction: column;
    }

    /* ── Top bar ── */

      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      flex-shrink: 0;
      gap: 12px;
      flex-wrap: wrap;
    }

    #top-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill {
      background: #1d4ed8;
      color: #fff;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .pill.gold {
      background: linear-gradient(135deg, #b45309, #d97706);
    }

    .muted-pill {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s, opacity 0.12s, background 0.15s;
      font-family: inherit;
    }
    button:hover:not(:disabled) { transform: translateY(-1px); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      color: #94a3b8;
      border: 1px solid #334155;
    }
    .btn-ghost:hover:not(:disabled) { border-color: #64748b; color: #e2e8f0; }

    /* ── Content ── */
    #content {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 340px;
      min-height: 0;
    }

    /* ── Map panel ── */
    #map-panel {
      position: relative;
      background: #0f172a;
    }

    #city-map {
      width: 100%;
      height: 100%;
    }

    #city-label {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 23, 42, 0.88);
      border: 1px solid #334155;
      backdrop-filter: blur(8px);
      color: #f1f5f9;
      padding: 10px 22px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.05em;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ── Right panel ── */
    #right-panel {
      display: flex;
      flex-direction: column;
      background: #1e293b;
      border-left: 1px solid #334155;
      overflow: hidden;
    }

    #right-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid #334155;
      flex-shrink: 0;
    }

    #right-header h2 {
      font-size: 16px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 4px;
    }

    #right-header p {
      font-size: 12px;
      color: #64748b;
      line-height: 1.5;
    }

    /* ── Province grid ── */
    #province-grid {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      align-content: start;
    }

    #province-grid::-webkit-scrollbar { width: 4px; }
    #province-grid::-webkit-scrollbar-track { background: transparent; }
    #province-grid::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    .province-btn {
      background: #0f172a;
      color: #cbd5e1;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 9px 4px;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }

    .province-btn:hover:not(:disabled):not(.revealed):not(.correct):not(.wrong) {
      background: #1d4ed8;
      border-color: #3b82f6;
      color: #fff;
      transform: translateY(-1px);
    }

    .province-btn:disabled { cursor: not-allowed; }

    .province-btn.correct {
      background: #14532d;
      border-color: #22c55e;
      color: #86efac;
    }

    .province-btn.wrong {
      background: #450a0a;
      border-color: #ef4444;
      color: #fca5a5;
    }

    .province-btn.revealed {
      background: #14532d;
      border-color: #22c55e;
      color: #86efac;
    }

    /* ── Result overlay ── */
    #round-result {
      position: absolute;
      inset: 0;
      background: rgba(2, 6, 23, 0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 20px;
    }

    .result-card {
      width: min(500px, 100%);
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    .result-top {
      padding: 22px 22px 16px;
      border-bottom: 1px solid #334155;
    }

    .result-emoji {
      font-size: 40px;
      margin-bottom: 8px;
      display: block;
    }

    .result-top h2 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 6px;
      color: #f1f5f9;
    }

    .result-top p {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
    }

    .result-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 16px 22px;
    }

    .metric {
      background: #0f172a;
      border: 1px solid #1e3a5f;
      border-radius: 12px;
      padding: 12px 14px;
    }

    .metric-label { font-size: 11px; color: #64748b; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
    .metric-value { font-size: 22px; font-weight: 800; color: #f1f5f9; }
    .metric-value.green { color: #4ade80; }
    .metric-value.red   { color: #f87171; }

    .result-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 22px 20px;
      gap: 10px;
    }

    .result-footer span { font-size: 14px; color: #64748b; }

    .btn-primary {
      background: #2563eb;
      color: #fff;
      padding: 10px 20px;
      border-radius: 10px;
    }
    .btn-primary:hover { background: #1d4ed8; }

    /* ── Final screen ── */
    #final-screen {
      position: absolute;
      inset: 0;
      background: rgba(2, 6, 23, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 60;
      padding: 20px;
    }

    .final-card {
      width: min(560px, 100%);
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 24px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      overflow: hidden;
    }

    .final-header {
      padding: 26px 26px 16px;
      border-bottom: 1px solid #334155;
      text-align: center;
    }

    .final-header p  { font-size: 14px; color: #94a3b8; line-height: 1.6; }

    .score-highlight { color: #facc15; font-weight: 900; font-size: 1.2em; }

    #summary-list {
      padding: 14px 20px 6px;
      display: grid;
      gap: 8px;
      max-height: 320px;
      overflow-y: auto;

      justify-content: space-between;
      align-items: center;

    .summary-item .si-score { font-size: 20px; font-weight: 900; white-space: nowrap; }

      padding: 14px 20px 22px;
      display: flex;
      justify-content: flex-end;
    }

      body { overflow: auto; }
      #content { grid-template-columns: 1fr; grid-template-rows: 50vh auto; }

  </style>
</head>

</div>

<!-- Round result overlay -->
<div id="round-result">

    <div class="result-metrics">

      </div>
      <div class="metric">
        <div class="metric-label">当前总分</div>
        <div class="metric-value" id="metric-total">0</div>

      <div class="metric">

      <div class="metric">
        <div class="metric-label">正确省份</div>
        <div class="metric-value" style="font-size:16px;" id="metric-province">—</div>
      </div>
    </div>
    <div class="result-footer">
      <span id="result-streak"></span>
      <button class="btn-primary" id="next-round-btn">下一轮 →</button>
    </div>
  </div>
</div>

<!-- Final screen -->
<div id="final-screen">
  <div class="final-card">
    <div class="final-header">
      <h2>游戏结束 🏆</h2>
      <p id="final-text"></p>
    </div>
    <div id="summary-list"></div>
    <div class="final-footer">
      <button class="btn-primary" id="play-again-btn">再玩一次</button>
    </div>
  </div>
</div>

  { name:"林芝",    province:"西藏自治区",          lat:29.6490, lng:94.3624  },
  // 宁夏
  { name:"固原",    province:"宁夏回族自治区",      lat:36.0042, lng:106.2422 },
  { name:"中卫",    province:"宁夏回族自治区",      lat:37.5199, lng:105.1963 },
  // 海南
  { name:"琼海",    province:"海南省",              lat:19.2466, lng:110.4751 },
  { name:"儋州",    province:"海南省",              lat:19.5207, lng:109.5806 },
];

const ALL_PROVINCES = [
  "北京市","天津市","上海市","重庆市",
  "河北省","山西省","辽宁省","吉林省","黑龙江省",
  "江苏省","浙江省","安徽省","福建省","江西省","山东省",
  "河南省","湖北省","湖南省","广东省","海南省",
  "四川省","贵州省","云南省","陕西省","甘肃省","青海省",
  "内蒙古自治区","广西壮族自治区","西藏自治区",
  "宁夏回族自治区","新疆维吾尔自治区",
];

// ─────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────
const state = {
  round: 1,
  totalScore: 0,
  correctStreak: 0,
  map: null,
  currentCity: null,
  roundSubmitted: false,
  roundHistory: [],
  usedCityIndices: new Set(),
};

// ─────────────────────────────────────────────────────────
//  DOM REFS
// ─────────────────────────────────────────────────────────
const els = {
  roundPill:      document.getElementById("round-pill"),
  scorePill:      document.getElementById("score-pill"),
  restartBtn:     document.getElementById("restart-btn"),
  cityLabel:      document.getElementById("city-label"),
  provinceGrid:   document.getElementById("province-grid"),
  roundResult:    document.getElementById("round-result"),
  resultEmoji:    document.getElementById("result-emoji"),
  resultHeading:  document.getElementById("result-heading"),
  resultDesc:     document.getElementById("result-desc"),
  metricScore:    document.getElementById("metric-score"),
  metricTotal:    document.getElementById("metric-total"),
  metricCity:     document.getElementById("metric-city"),
  metricProvince: document.getElementById("metric-province"),
  resultStreak:   document.getElementById("result-streak"),
  nextRoundBtn:   document.getElementById("next-round-btn"),
  finalScreen:    document.getElementById("final-screen"),
  finalText:      document.getElementById("final-text"),
  summaryList:    document.getElementById("summary-list"),
  playAgainBtn:   document.getElementById("play-again-btn"),
};

// ─────────────────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────────────────
function updateHeader() {
  els.roundPill.textContent = `第 ${state.round} / ${CONFIG.totalRounds} 轮`;
  els.scorePill.textContent = `总分：${state.totalScore}`;
}

function pickCity() {
  let idx;
  let tries = 0;
  do {
    idx = Math.floor(Math.random() * CITY_POOL.length);
    tries++;
  } while (state.usedCityIndices.has(idx) && tries < CITY_POOL.length);
  state.usedCityIndices.add(idx);
  return CITY_POOL[idx];
}

// ─────────────────────────────────────────────────────────
//  MAP
// ─────────────────────────────────────────────────────────
function initMap() {
  state.map = new qq.maps.Map(document.getElementById("city-map"), {
    zoom: CONFIG.cityZoom,
    center: new qq.maps.LatLng(39.9042, 116.4074),
    mapTypeControl: false,
    zoomControl: false,
    scaleControl: false,
    panControl: false,
    draggable: false,
    scrollwheel: false,
    disableDoubleClickZoom: true,
  });
}

function flyToCity(city) {
  // Tiny random offset so the city name label isn't always dead-center
  const jitterLat = (Math.random() - 0.5) * 0.006;
  const jitterLng = (Math.random() - 0.5) * 0.010;
  state.map.setCenter(new qq.maps.LatLng(city.lat + jitterLat, city.lng + jitterLng));
  state.map.setZoom(CONFIG.cityZoom);
}

// ─────────────────────────────────────────────────────────
//  PROVINCE BUTTONS
// ─────────────────────────────────────────────────────────
function buildProvinceGrid() {
  els.provinceGrid.innerHTML = "";
  // Shuffle so order doesn't hint at the answer
  const shuffled = [...ALL_PROVINCES].sort(() => Math.random() - 0.5);
  shuffled.forEach(prov => {
    const btn = document.createElement("button");
    btn.className = "province-btn";
    btn.textContent = prov;
    btn.dataset.province = prov;
    btn.addEventListener("click", () => handleGuess(prov, btn));
    els.provinceGrid.appendChild(btn);
  });
}

function disableAllProvinceButtons() {
  els.provinceGrid.querySelectorAll(".province-btn").forEach(b => {
    b.disabled = true;
  });
}

function revealCorrectButton(correctProvince) {
  els.provinceGrid.querySelectorAll(".province-btn").forEach(btn => {
    if (btn.dataset.province === correctProvince) {
      btn.classList.add("revealed");
    }
  });
}

// ─────────────────────────────────────────────────────────
//  GAME LOGIC
// ─────────────────────────────────────────────────────────
function handleGuess(guessedProvince, btn) {
  if (state.roundSubmitted) return;
  state.roundSubmitted = true;

  const correct = state.currentCity.province;
  const isCorrect = guessedProvince === correct;
  const score = isCorrect ? CONFIG.scorePerCorrect : 0;

  state.totalScore += score;

  if (isCorrect) {
    state.correctStreak++;
    btn.classList.add("correct");
  } else {
    state.correctStreak = 0;
    btn.classList.add("wrong");
    revealCorrectButton(correct);
  }

  disableAllProvinceButtons();
  updateHeader();

  state.roundHistory.push({
    city: state.currentCity.name,
    correct,
    guessed: guessedProvince,
    isCorrect,
    score,
  });

  showResultModal(isCorrect, score, guessedProvince, correct);
}

function loadRound() {
  state.roundSubmitted = false;
  state.currentCity = pickCity();
  flyToCity(state.currentCity);
  els.cityLabel.textContent = "🔍 这座城市属于哪个省 / 市 / 自治区？";
  buildProvinceGrid();
  updateHeader();
}

// ─────────────────────────────────────────────────────────
//  MODALS
// ─────────────────────────────────────────────────────────
function showResultModal(isCorrect, score, guessed, correct) {
  els.resultEmoji.textContent   = isCorrect ? "✅" : "❌";
  els.resultHeading.textContent = isCorrect ? "回答正确！" : "回答错误！";
  els.resultDesc.textContent    = isCorrect
    ? `没错，${state.currentCity.name} 确实在 ${correct}！`
    : `${state.currentCity.name} 其实在 ${correct}，你猜的是 ${guessed}。`;

  els.metricScore.textContent    = isCorrect ? `+${score}` : "0";
  els.metricScore.className      = "metric-value " + (isCorrect ? "green" : "red");
  els.metricTotal.textContent    = state.totalScore;
  els.metricCity.textContent     = state.currentCity.name;
  els.metricProvince.textContent = correct;

  els.resultStreak.textContent   = state.correctStreak >= 2
    ? `🔥 连续答对 ${state.correctStreak} 题！`
    : "";

  els.nextRoundBtn.textContent   = state.round >= CONFIG.totalRounds ? "查看最终成绩 →" : "下一轮 →";
  els.roundResult.style.display  = "flex";
}

function hideResultModal() {
  els.roundResult.style.display = "none";
}

function showFinalScreen() {
  const max     = CONFIG.totalRounds * CONFIG.scorePerCorrect;
  const correct = state.roundHistory.filter(r => r.isCorrect).length;
  const pct     = Math.round((state.totalScore / max) * 100);

  let verdict = "";
  if (correct === CONFIG.totalRounds)            verdict = "满分！地理学霸！🏆";
  else if (correct >= CONFIG.totalRounds * 0.8)  verdict = "非常不错！📚";
  else if (correct >= CONFIG.totalRounds * 0.6)  verdict = "还不错，继续努力！💪";
  else                                            verdict = "多看看地图吧！🗺️";

  els.finalText.innerHTML =
    `答对 <span class="score-highlight">${correct} / ${CONFIG.totalRounds}</span> 题，` +
    `得分 <span class="score-highlight">${state.totalScore}</span> 分（${pct}%）。${verdict}`;

  els.summaryList.innerHTML = "";
  state.roundHistory.forEach((item, i) => {
    const div = document.createElement("div");
    div.className = "summary-item";
    div.innerHTML = `
      <div class="si-left">
        <strong>第 ${i + 1} 轮：${item.city}</strong>
        <span>正确答案：${item.correct}${item.isCorrect ? "" : "&nbsp;&nbsp;你猜：" + item.guessed}</span>
      </div>
      <div class="si-score ${item.isCorrect ? "correct" : "wrong"}">
        ${item.isCorrect ? "+1000" : "✗"}
      </div>
    `;
    els.summaryList.appendChild(div);
  });

  els.finalScreen.style.display = "flex";
}

function hideFinalScreen() {
  els.finalScreen.style.display = "none";
}

function nextRound() {
  hideResultModal();
  if (state.round >= CONFIG.totalRounds) {
    showFinalScreen();
    return;
  }
  state.round++;
  loadRound();
}

function restartGame() {
  hideResultModal();
  hideFinalScreen();
  state.round = 1;
  state.totalScore = 0;
  state.correctStreak = 0;
  state.roundHistory = [];
  state.usedCityIndices.clear();
  loadRound();
}

// ─────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────
function init() {
  if (!window.qq || !qq.maps) {
    alert("腾讯地图 JS API 加载失败，请检查 key 和域名白名单。");
    return;
  }
  initMap();
  loadRound();
}

els.nextRoundBtn.addEventListener("click", nextRound);
els.restartBtn.addEventListener("click", restartGame);
els.playAgainBtn.addEventListener("click", restartGame);

window.onload = init;
</script>
</body>
</html>
